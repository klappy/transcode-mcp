name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run tsc --noEmit

      - name: Lint (if configured)
        run: bun run lint || echo "No lint script defined yet"
        continue-on-error: true

      - name: Run unit tests
        run: bun test

      - name: Upload test results (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            test-results/
          retention-days: 7

  smoke-test:
    name: Smoke Test (Live Worker)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ secrets.WORKER_PREVIEW_URL != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run smoke tests against preview Worker
        env:
          WORKER_BASE_URL: ${{ secrets.WORKER_PREVIEW_URL }}
        run: bun run smoke-test.ts

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-evidence
          path: smoke-results/
          retention-days: 14
