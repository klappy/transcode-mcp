name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run tsc --noEmit

      - name: Run unit tests
        run: bun test

  # Compute the per-branch Cloudflare preview URL once and share it with the
  # smoke jobs. Per-branch previews are VERSIONS of the shared
  # `transcode-mcp-development` worker, created by that worker's Workers Builds
  # project when non-production branch builds are enabled. Cloudflare aliases
  # each branch to:
  #   <branch-slug>-transcode-mcp-development.<subdomain>.workers.dev   ('/' -> '-')
  # Names that push the label past 63 chars hit CF's truncation+hash scheme,
  # which we don't derive (rare for this repo). NOTE: this is a *preview* host,
  # so it only exists for branches the preview project actually builds (PR
  # branches). See canon/governance/deploy-architecture.md.
  resolve-preview:
    name: Resolve preview URL
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    outputs:
      base_url: ${{ steps.url.outputs.base_url }}
    steps:
      - name: Compute branch slug + URL
        id: url
        run: |
          REF="${{ github.head_ref || github.ref_name }}"
          # Cloudflare replaces '/' with '-'; leave the rest of the slug
          # rules to CF (rare-case truncation handled by their hash scheme).
          SLUG="${REF//\//-}"
          BASE_URL="https://${SLUG}-transcode-mcp-development.klappy.workers.dev"
          echo "base_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "Branch: ${REF}"
          echo "Preview: ${BASE_URL}"

      # Cloudflare's auto-deploy runs in parallel with this workflow, so the
      # preview may not be live yet when smoke jobs start. Wait (up to ~5 min)
      # for the root path to return 200 before the smoke jobs assume it's up.
      - name: Wait for preview deploy to be reachable
        run: |
          URL="${{ steps.url.outputs.base_url }}/"
          echo "Polling ${URL}"
          for i in $(seq 1 60); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "Preview is live (HTTP 200) after ${i} attempt(s)."
              exit 0
            fi
            echo "  attempt ${i}: HTTP ${CODE} — waiting 5s"
            sleep 5
          done
          echo "Preview did not become reachable in time."
          exit 1

  smoke-proxy:
    name: Smoke — proxy (canon worked examples)
    runs-on: ubuntu-latest
    needs: resolve-preview
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run proxy smoke against preview
        env:
          WORKER_BASE_URL: ${{ needs.resolve-preview.outputs.base_url }}
        run: bun run smoke-test.ts

  smoke-mcp:
    name: Smoke — MCP protocol (JSON-RPC over /mcp)
    runs-on: ubuntu-latest
    needs: resolve-preview
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run MCP smoke against preview
        run: bun smoke-mcp.ts "${{ needs.resolve-preview.outputs.base_url }}"
