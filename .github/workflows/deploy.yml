name: Deploy

# Three-tier deploy model (see wrangler.toml for the binding details):
#
#   push main      -> transcode-mcp            (production, full stack)
#   push staging   -> transcode-mcp-staging    (staging, full stack, own bucket/DO)
#   open/update PR -> transcode-mcp-pr-<N>      (disposable per-branch preview)
#   close PR       -> delete transcode-mcp-pr-<N>
#
# Every PR automatically gets its own isolated worker — no manual Cloudflare
# setup per branch. Previews carry NO container/DO (audio passthrough), so they
# can never collide with or disturb prod or staging state.
#
# Secrets required (repo Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   - token with Workers Scripts:Edit (+ Workers R2 for
#                            the staging bucket) on this account
#   CLOUDFLARE_ACCOUNT_ID  - the account id
#
# IMPORTANT cutover note: if Cloudflare Workers Builds is still wired to
# auto-deploy `transcode-mcp` from main, DISABLE that auto-deploy before
# enabling the deploy-production job below — otherwise main pushes deploy prod
# twice. Pick ONE deployer for prod.

on:
  push:
    branches: [main, staging]
  pull_request:
    types: [opened, synchronize, reopened, closed]

# Serialize deploys to the same target so two pushes don't race the same worker.
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write

env:
  WORKERS_SUBDOMAIN: klappy # <subdomain>.workers.dev for this account

jobs:
  deploy-production:
    name: Deploy production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Deploy to production (transcode-mcp)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler@4 deploy

  deploy-staging:
    name: Deploy staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Deploy to staging (transcode-mcp-staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler@4 deploy --env staging

  deploy-preview:
    name: Deploy PR preview
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Deploy preview (transcode-mcp-pr-<N>)
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          NAME="transcode-mcp-pr-${{ github.event.pull_request.number }}"
          # --name overrides the [env.preview] worker name so each PR is its own
          # worker. [env.preview] carries no container, so this is a fast deploy.
          bunx wrangler@4 deploy --env preview --name "$NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "url=https://${NAME}.${WORKERS_SUBDOMAIN}.workers.dev" >> "$GITHUB_OUTPUT"
      - name: Comment preview URL on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const marker = '<!-- preview-deploy -->';
            const body = `${marker}\n🚀 **Preview deployed:** ${url}\n\n` +
              `Worker: \`${{ steps.deploy.outputs.name }}\` — disposable, torn down when this PR closes. ` +
              `Audio is passthrough on previews (live transcode is validated on staging).`;
            const { owner, repo } = context.repo;
            const number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number: number });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: number, body });
            }

  teardown-preview:
    name: Tear down PR preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Delete preview worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          NAME="transcode-mcp-pr-${{ github.event.pull_request.number }}"
          # Don't fail the workflow if it was never deployed / already gone.
          bunx wrangler@4 delete --name "$NAME" || echo "delete skipped (worker $NAME not found)"
