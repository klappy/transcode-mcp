# wrangler.toml
name = "transcode-mcp"
main = "src/worker.ts"
compatibility_date = "2025-05-01"
compatibility_flags = [ "nodejs_compat" ]

[vars]
# CANON_ENDPOINT = "https://your-canon-endpoint.example.com/query"   # Used by the docs tool

# Cloudflare Images binding (for image path) — required for half-class transforms.
# Without this, the worker falls back to passthrough (X-Transcode-Encode: no-binding).
[images]
binding = "IMAGES"

# R2 bucket for transcoded audio output — content-addressed, lazy writes,
# 90-day lifecycle GC (configured on the bucket). The Worker owns the key and
# the read/write; the container never touches R2.
[[r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "transcode-mcp-audio"

# Audio transcode Container, fronted by the AudioContainer Durable Object.
# ffmpeg + the recipe table live in container/. The Worker dispatches
# (source_url, preset, q, codec); the container stays cache/credential-ignorant.
[[containers]]
class_name = "AudioContainer"
image = "./container/Dockerfile"
max_instances = 5

[[durable_objects.bindings]]
class_name = "AudioContainer"
name = "AUDIO_CONTAINER"

[[migrations]]
new_sqlite_classes = [ "AudioContainer" ]
tag = "v1"

# For local dev with `wrangler dev`
[dev]
port = 8787

# ─────────────────────────────────────────────────────────────────────────────
# THREE-TIER DEPLOY MODEL — one config, deployed as separate isolated Workers.
# Nothing below ever touches production (`transcode-mcp`, the top-level config).
#
#   prod     : main branch     -> wrangler deploy                 -> transcode-mcp
#   staging  : staging branch  -> wrangler deploy --env staging   -> transcode-mcp-staging
#   preview  : every PR branch -> wrangler deploy --env preview --name transcode-mcp-pr-<N>
#
# Bindings are NON-inheritable in Wrangler environments, so each tier redeclares
# what it needs against its OWN resources. Prod and staging share NO state.
# ─────────────────────────────────────────────────────────────────────────────

# ── STAGING ──────────────────────────────────────────────────────────────────
# A full second stack: its OWN container, DO class, and R2 bucket. Distinct DO
# class (AudioContainerStaging) because a container application is keyed on the
# DO class name, not the worker name — reusing `AudioContainer` would collide
# with prod (DURABLE_OBJECT_ALREADY_HAS_APPLICATION). This is the constant
# staging URL (transcode-mcp-staging.<subdomain>.workers.dev) where live audio
# transcoding is validated before anything merges toward prod.
#
# One-time: wrangler r2 bucket create transcode-mcp-audio-staging
[env.staging]
name = "transcode-mcp-staging"

[env.staging.vars]

[env.staging.images]
binding = "IMAGES"

[[env.staging.r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "transcode-mcp-audio-staging"

[[env.staging.containers]]
class_name = "AudioContainerStaging"
image = "./container/Dockerfile"
max_instances = 5

[[env.staging.durable_objects.bindings]]
class_name = "AudioContainerStaging"
name = "AUDIO_CONTAINER"

[[env.staging.migrations]]
new_sqlite_classes = [ "AudioContainerStaging" ]
tag = "v1"

# ── DEV (shared preview backend) ─────────────────────────────────────────────
# ONE shared dev worker. Every PR branch uploads a VERSION of transcode-mcp-dev
# (Workers Builds non-production branch build -> `wrangler versions upload`),
# getting its own stable preview URL (<branch>-transcode-mcp-dev.<sub>.workers.dev)
# while sharing this one container/DO/bucket. Distinct DO class AudioContainerDev
# (container apps are keyed on the DO class). Last-build-wins on shared state;
# code-only PRs preview their own version safely. A PR that changes the DO shape
# needs a new migration, which `versions upload` rejects — known edge case,
# handled when we hit it (deploy that branch to the dev *branch* via full deploy).
#
# One-time: wrangler r2 bucket create transcode-mcp-audio-dev
[env.dev]
name = "transcode-mcp-dev"

[env.dev.vars]

[env.dev.images]
binding = "IMAGES"

[[env.dev.r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "transcode-mcp-audio-dev"

[[env.dev.containers]]
class_name = "AudioContainerDev"
image = "./container/Dockerfile"
max_instances = 5

[[env.dev.durable_objects.bindings]]
class_name = "AudioContainerDev"
name = "AUDIO_CONTAINER"

[[env.dev.migrations]]
new_sqlite_classes = [ "AudioContainerDev" ]
tag = "v1"
