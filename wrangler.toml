# wrangler.toml
name = "transcode-mcp"
main = "src/worker.ts"
compatibility_date = "2025-05-01"
compatibility_flags = [ "nodejs_compat" ]

[vars]
# CANON_ENDPOINT = "https://your-canon-endpoint.example.com/query"   # Used by the docs tool

# Cloudflare Images binding (for image path) — required for half-class transforms.
# Without this, the worker falls back to passthrough (X-Transcode-Encode: no-binding).
[images]
binding = "IMAGES"

# R2 bucket for transcoded audio output — content-addressed, lazy writes,
# 90-day lifecycle GC (configured on the bucket). The Worker owns the key and
# the read/write; the container never touches R2.
[[r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "transcode-mcp-audio"

# Audio transcode Container, fronted by the AudioContainer Durable Object.
# ffmpeg + the recipe table live in container/. The Worker dispatches
# (source_url, preset, q, codec); the container stays cache/credential-ignorant.
[[containers]]
class_name = "AudioContainer"
image = "./container/Dockerfile"
max_instances = 5

[[durable_objects.bindings]]
class_name = "AudioContainer"
name = "AUDIO_CONTAINER"

[[migrations]]
new_sqlite_classes = [ "AudioContainer" ]
tag = "v1"

# For local preview with `wrangler preview`
[preview]
port = 8787

# -----------------------------------------------------------------------------
# DEPLOY MODEL -- one config, deployed as separate isolated same-account Workers,
# each via its OWN Cloudflare project (production branch + a pinned --env deploy
# command). Bindings are NON-inheritable across Wrangler environments, so every
# tier redeclares what it needs against its OWN resources; tiers share NO state.
#
#   production  : production branch -> wrangler deploy --env production  -> transcode-mcp-production   (primary; serves transcode.klappy.dev)
#   staging     : staging branch    -> wrangler deploy --env staging     -> transcode-mcp-staging
#   development : main branch        -> wrangler deploy --env development -> transcode-mcp-development   (integration; PR branches preview as versions here)
#
# Promotion runs development(main) -> staging -> production.
#
# The top-level config below (name = "transcode-mcp") is LEGACY: the original
# single-prod instance, retired in favor of [env.production]. No CF project
# deploys it (no bare `wrangler deploy`); it remains only as the default/base.
# TODO(cleanup): retire or repoint the top-level config + its transcode-mcp-audio
# bucket once the old transcode-mcp project teardown is confirmed complete.
# -----------------------------------------------------------------------------

# ── STAGING ──────────────────────────────────────────────────────────────────
# A full second stack: its OWN container, DO class, and R2 bucket. Distinct DO
# class (AudioContainerStaging) because a container application is keyed on the
# DO class name, not the worker name — reusing `AudioContainer` would collide
# with prod (DURABLE_OBJECT_ALREADY_HAS_APPLICATION). This is the constant
# staging URL (transcode-mcp-staging.<subdomain>.workers.dev) where live audio
# transcoding is validated before anything merges toward prod.
#
# One-time: wrangler r2 bucket create transcode-mcp-audio-staging
[env.staging]
name = "transcode-mcp-staging"

[env.staging.vars]

[env.staging.images]
binding = "IMAGES"

[[env.staging.r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "transcode-mcp-audio-staging"

[[env.staging.containers]]
class_name = "AudioContainerStaging"
image = "./container/Dockerfile"
max_instances = 5

[[env.staging.durable_objects.bindings]]
class_name = "AudioContainerStaging"
name = "AUDIO_CONTAINER"

[[env.staging.migrations]]
new_sqlite_classes = [ "AudioContainerStaging" ]
tag = "v1"

# -- DEVELOPMENT (the main-fed integration tier) ------------------------------
# Lowest rung of the promotion ladder: development -> staging -> production.
# Fed by `main` via its own CF project (production branch = `main`, deploy
# command = `npx wrangler deploy --env development`): every merge to main lands
# here first and is exercised end-to-end (real audio transcoding) before being
# promoted to staging. Per-PR branch builds render as preview *versions* on this
# same worker, REUSING the AudioContainerDevelopment DO/container that the main
# deploy already stood up -- so there is no per-branch container standup (the
# failure mode 6c8182c hit on the old preview tier; here only the single
# production branch `main` runs a full deploy, so it never recurs).
#
# Full stack like staging/production: its OWN worker, DO class, and R2 bucket
# (same-account uniqueness). Worker CODE + binding names are identical across
# tiers, so development runs exactly what staging and production run.
#
# One-time: wrangler r2 bucket create transcode-mcp-audio-development
[env.development]
name = "transcode-mcp-development"

[env.development.vars]

[env.development.images]
binding = "IMAGES"

[[env.development.r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "transcode-mcp-audio-development"

[[env.development.containers]]
class_name = "AudioContainerDevelopment"
image = "./container/Dockerfile"
max_instances = 5

[[env.development.durable_objects.bindings]]
class_name = "AudioContainerDevelopment"
name = "AUDIO_CONTAINER"

[[env.development.migrations]]
new_sqlite_classes = [ "AudioContainerDevelopment" ]
tag = "v1"

# ── PRODUCTION (the primary instance) ────────────────────────────────────────
# Additive primary prod stack: its OWN worker (transcode-mcp-production), DO
# class (AudioContainerProduction), and R2 bucket. Fed by the `production`
# branch via its own CF project: production branch = `production`, deploy
# command = `npx wrangler deploy --env production`. Same-account uniqueness is
# why name/class/bucket all differ from the main-fed and staging tiers; the
# worker CODE and binding names (AUDIO_CONTAINER, AUDIO_BUCKET) are identical
# across tiers, so production runs exactly what staging validated.
#
# One-time: wrangler r2 bucket create transcode-mcp-audio-production
[env.production]
name = "transcode-mcp-production"

[env.production.vars]

[env.production.images]
binding = "IMAGES"

[[env.production.r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "transcode-mcp-audio-production"

[[env.production.containers]]
class_name = "AudioContainerProduction"
image = "./container/Dockerfile"
max_instances = 5

[[env.production.durable_objects.bindings]]
class_name = "AudioContainerProduction"
name = "AUDIO_CONTAINER"

[[env.production.migrations]]
new_sqlite_classes = [ "AudioContainerProduction" ]
tag = "v1"
