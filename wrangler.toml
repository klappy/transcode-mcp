# wrangler.toml
name = "transcode-mcp"
main = "src/worker.ts"
compatibility_date = "2025-05-01"
compatibility_flags = [ "nodejs_compat" ]

[vars]
# CANON_ENDPOINT = "https://your-canon-endpoint.example.com/query"   # Used by the docs tool

# Cloudflare Images binding (for image path) — required for half-class transforms.
# Without this, the worker falls back to passthrough (X-Transcode-Encode: no-binding).
[images]
binding = "IMAGES"

# R2 bucket for audio output (lazy writes)
# [[r2_buckets]]
# binding = "AUDIO_BUCKET"
# bucket_name = "transcode-mcp-audio"

# Container / Durable Object for heavy audio work (future)
# [durable_objects]
# bindings = [{ name = "AUDIO_CONTAINER", class_name = "AudioContainer" }]

# For local dev with `wrangler dev`
[dev]
port = 8787